<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Dashboard Dashboard</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --danger-color: #e74c3c;
            --bg-color: #f4f6f9;
            --text-color: #333;
            --sidebar-width: 240px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--primary-color);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar-brand {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .nav-btn {
            background-color: transparent;
            color: #ecf0f1;
            border: none;
            padding: 12px 20px;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            transition: all 0.3s ease;
            display: block;
        }

        .nav-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: white;
            padding-left: 25px;
        }

        .nav-btn.active {
            background-color: var(--secondary-color);
            color: white;
            font-weight: bold;
            border-left: 5px solid #fff;
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 30px;
        }

        .page-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* --- FORM / INPUT AREA --- */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit:hover {
            background-color: #16a085;
        }

        /* --- TABLE STYLE --- */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            color: var(--primary-color);
            font-weight: bold;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">Affiliate Panel</div>
        <button class="nav-btn active" id="btn-rekap" onclick="switchPage('rekap-harian-page', 'btn-rekap')">Rekap Harian</button>
        <button class="nav-btn" id="btn-atribusi" onclick="switchPage('attribution-rekap-page', 'btn-atribusi')">Rekap Atribusi</button>
    </div>

    <div class="main-content">

        <div id="rekap-harian-page" class="page-content">
            <h2>Laporan Rekap Harian</h2>
            
            <div class="form-group">
                <label>Input / Paste JSON Data Rekap Harian:</label>
                <textarea id="jsonInputRekap" placeholder='Masukkan data JSON rekap harian disini...'></textarea>
                <button class="btn-submit" onclick="importData('rekap')">Import Data Rekap</button>
            </div>

            <div class="table-container">
                <table id="rekapTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Klik Meta</th>
                            <th>Klik Shopee</th>
                            <th>Produk Terjual</th>
                            <th>Spend Meta</th>
                            <th>Komisi Shopee</th>
                            <th>Profit</th>
                            <th>ROI</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="rekapTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="attribution-rekap-page" class="page-content" style="display: none;">
            <h2>Rekap Atribusi Taglink Harian</h2>
            
            <div class="form-group">
                <label>Input / Paste JSON Data Atribusi Taglink:</label>
                <textarea id="jsonInputAtribusi" placeholder='Masukkan data JSON atribusi disini...'></textarea>
                <button class="btn-submit" onclick="importData('atribusi')">Import Data Atribusi</button>
            </div>

            <div class="table-container">
                <table id="attributionTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Klik Meta</th>
                            <th>Klik Shopee</th>
                            <th>Produk Terjual</th>
                            <th>Spend Meta</th>
                            <th>Komisi Shopee</th>
                            <th>Profit</th>
                            <th>ROI</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="attributionTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const REKAP_KEY = 'affiliate_saved_reports';
        const ATRIBUSI_KEY = 'affiliate_attribution_reports';

        // --- 1. SCRIPT PERPINDAHAN HALAMAN ---
        function switchPage(pageId, btnId) {
            document.getElementById('rekap-harian-page').style.display = 'none';
            document.getElementById('attribution-rekap-page').style.display = 'none';
            
            document.getElementById(pageId).style.display = 'block';

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');

            if (pageId === 'rekap-harian-page') renderRekapTable();
            if (pageId === 'attribution-rekap-page') renderAttributionTable();
        }

        // --- 2. SCRIPT ENGINE IMPORT JSON (ANTI-EROR) ---
        function importData(type) {
            const inputId = type === 'rekap' ? 'jsonInputRekap' : 'jsonInputAtribusi';
            const storageKey = type === 'rekap' ? REKAP_KEY : ATRIBUSI_KEY;
            const rawData = document.getElementById(inputId).value.trim();

            if (!rawData) {
                alert("Silakan masukkan teks JSON terlebih dahulu!");
                return;
            }

            try {
                const parsedData = JSON.parse(rawData);
                const dataArray = Array.isArray(parsedData) ? parsedData : [parsedData];

                let localDb = [];
                try {
                    const existingData = localStorage.getItem(storageKey);
                    localDb = existingData ? JSON.parse(existingData) : [];
                } catch (e) {
                    localDb = [];
                }

                dataArray.forEach(itemBaru => {
                    // Penyelarasan properti pesanan -> produkTerjual
                    if (itemBaru.pesanan !== undefined && itemBaru.produkTerjual === undefined) {
                        itemBaru.produkTerjual = itemBaru.pesanan;
                    }
                    
                    const idx = localDb.findIndex(itemLama => itemLama.tanggal === itemBaru.tanggal);
                    if (idx !== -1) {
                        localDb[idx] = itemBaru;
                    } else {
                        localDb.push(itemBaru);
                    }
                });

                localStorage.setItem(storageKey, JSON.stringify(localDb));
                alert(`Sukses mengimport data ${type}!`);
                document.getElementById(inputId).value = '';
                
                if (type === 'rekap') renderRekapTable();
                else renderAttributionTable();

            } catch (error) {
                alert("Gagal Import! Format JSON tidak valid atau rusak. Silakan periksa kembali teks input Anda.");
                console.error(error);
            }
        }

        // --- 3. RENDER TABEL REKAP HARIAN ---
        function renderRekapTable() {
            const tbody = document.getElementById('rekapTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            let database = [];
            try {
                const isiStorage = localStorage.getItem(REKAP_KEY);
                database = isiStorage ? JSON.parse(isiStorage) : [];
            } catch (e) { database = []; }

            database.sort((a, b) => b.tanggal.localeCompare(a.tanggal));

            if (database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;">Belum ada data rekap harian.</td></tr>`;
                return;
            }

            database.forEach(item => {
                const roiText = item.roi === null || item.roi === undefined ? '-' : item.roi + '%';
                const row = `
                    <tr>
                        <td><b>${item.tanggal}</b></td>
                        <td>${(item.klikMeta || 0).toLocaleString('id-ID')}</td>
                        <td>${(item.klikShopee || 0).toLocaleString('id-ID')}</td>
                        <td>${(item.produkTerjual || 0).toLocaleString('id-ID')}</td>
                        <td>Rp ${(item.spend || 0).toLocaleString('id-ID')}</td>
                        <td>Rp ${(item.komisi || 0).toLocaleString('id-ID')}</td>
                        <td style="color: ${item.profit >= 0 ? 'green' : 'red'}; font-weight: bold;">Rp ${(item.profit || 0).toLocaleString('id-ID')}</td>
                        <td style="color: ${item.roi >= 0 ? 'green' : 'red'}; font-weight: bold;">${roiText}</td>
                        <td><button class="btn-danger" onclick="deleteRekapRow('${item.tanggal}')">Hapus</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function deleteRekapRow(tanggal) {
            if (confirm(`Hapus data rekap harian tanggal ${tanggal}?`)) {
                let database = JSON.parse(localStorage.getItem(REKAP_KEY)) || [];
                database = database.filter(item => item.tanggal !== tanggal);
                localStorage.setItem(REKAP_KEY, JSON.stringify(database));
                renderRekapTable();
            }
        }

        // --- 4. RENDER TABEL REKAP ATRIBUSI ---
        function renderAttributionTable() {
            const tbody = document.getElementById('attributionTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';

            let database = [];
            try {
                const isiStorage = localStorage.getItem(ATRIBUSI_KEY);
                database = isiStorage ? JSON.parse(isiStorage) : [];
            } catch (e) { database = []; }

            database.sort((a, b) => b.tanggal.localeCompare(a.tanggal));

            if (database.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;">Belum ada data rekap atribusi taglink.</td></tr>`;
                return;
            }

            database.forEach(item => {
                const roiText = item.roi === null || item.roi === undefined ? '-' : item.roi + '%';
                const row = `
                    <tr>
                        <td><b>${item.tanggal}</b></td>
                        <td>${(item.klikMeta || 0).toLocaleString('id-ID')}</td>
                        <td>${(item.klikShopee || 0).toLocaleString('id-ID')}</td>
                        <td>${(item.produkTerjual || 0).toLocaleString('id-ID')}</td>
                        <td>Rp ${(item.spend || 0).toLocaleString('id-ID')}</td>
                        <td>Rp ${(item.komisi || 0).toLocaleString('id-ID')}</td>
                        <td style="color: ${item.profit >= 0 ? 'green' : 'red'}; font-weight: bold;">Rp ${(item.profit || 0).toLocaleString('id-ID')}</td>
                        <td style="color: ${item.roi >= 0 ? 'green' : 'red'}; font-weight: bold;">${roiText}</td>
                        <td><button class="btn-danger" onclick="deleteAttributionRow('${item.tanggal}')">Hapus</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        function deleteAttributionRow(tanggal) {
            if (confirm(`Hapus data rekap atribusi tanggal ${tanggal}?`)) {
                let database = JSON.parse(localStorage.getItem(ATRIBUSI_KEY)) || [];
                database = database.filter(item => item.tanggal !== tanggal);
                localStorage.setItem(ATRIBUSI_KEY, JSON.stringify(database));
                renderAttributionTable();
            }
        }

        // Jalankan render tabel otomatis saat startup
        document.addEventListener("DOMContentLoaded", function() {
            renderRekapTable();
            renderAttributionTable();
        });
    </script>
</body>
</html>
